# PagerMonitor — nginx config for single-device mode with HTTPS + SSL
#
# Place in /etc/nginx/sites-available/pagermonitor
#   sudo ln -s /etc/nginx/sites-available/pagermonitor /etc/nginx/sites-enabled/pagermonitor
#   sudo nginx -t && sudo systemctl reload nginx
#
# For Let's Encrypt SSL (recommended):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
#
# For self-signed SSL:
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/pagermonitor.key \
#     -out /etc/ssl/certs/pagermonitor.crt

# WebSocket upgrade map — required for proper ws/wss proxying
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;   # Replace with your hostname or IP

    # --- SSL certificates ---
    # Option A: Let's Encrypt (certbot fills these in automatically)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Option B: Self-signed
    ssl_certificate     /etc/ssl/certs/pagermonitor.crt;
    ssl_certificate_key /etc/ssl/private/pagermonitor.key;

    # SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── WebSocket (wss://) — MUST be before location / ──────────────────────
    location /ws {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # These two headers are mandatory for WebSocket upgrade
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;

        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;

        # Disable buffering — essential for real-time streaming
        proxy_buffering     off;
        proxy_cache         off;

        # Keep WebSocket connections alive (24h)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── REST API, admin, auth ────────────────────────────────────────────────
    location ~ ^/(api|admin|auth|health)(/|$) {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Frontend / SPA catch-all ─────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
